services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: travel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - travel_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: travel_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - travel_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: travel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: travel_orders
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: travel123
      MYSQL_USER: travel_user
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - travel_network

networks:
  travel_network:
    driver: bridge

volumes:
  dbdata:
    driver: local